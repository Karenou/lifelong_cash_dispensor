# ============================================================
# 人生提款模拟器 · Nginx 配置
# 子域名：lifelong-cash-dispensor.finailab.com.cn
# ============================================================
#
# 部署步骤：
#   1. sudo cp deploy/nginx.conf /etc/nginx/sites-available/lifelong-cash.finailab.com.cn
#   2. sudo ln -s /etc/nginx/sites-available/lifelong-cash.finailab.com.cn /etc/nginx/sites-enabled/
#   3. sudo nginx -t
#   4. sudo systemctl reload nginx
#
# 同时在 DNSPod 加一条 A 记录：
#   主机记录: lifelong-cash-dispensor
#   记录类型: A
#   记录值:   43.139.209.228
# ============================================================

# HTTP 入口（备案通过后可加 443 ssl 跳转）
server {
    listen 80;
    server_name lifelong-cash-dispensor.finailab.com.cn;

    # 前端静态文件根目录
    root /var/www/lifelong-cash;
    index index.html;

    # 默认前端入口（SPA fallback）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反代到 uvicorn（127.0.0.1:8001）
    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 蒙特卡洛模拟可能耗时几秒，超时放宽到 60s
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # 上传/响应体大小（这个项目无大文件，但保险）
        client_max_body_size 10m;
    }

    # 静态资源缓存（CSS/JS/图片）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 日志
    access_log /var/log/nginx/lifelong-cash.access.log;
    error_log  /var/log/nginx/lifelong-cash.error.log;
}

